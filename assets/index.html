<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EdgeTTS for Legado</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --ink: #1a1a1a;
      --border: #e0e0e0;
      --accent: #000000;
      --input-bg: #fafafa;
      --input-bg-focus: #ffffff;
      --input-placeholder: #a0a0a0;
      --input-ring: rgba(0, 0, 0, 0.05);
      --btn-text: #ffffff;
      --btn-disabled-bg: #f0f0f0;
      --btn-disabled-text: #b0b0b0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --ink: #f5f5f5;
        --border: #333333;
        --accent: #ffffff;
        --input-bg: #1e1e1e;
        --input-bg-focus: #252525;
        --input-placeholder: #777777;
        --input-ring: rgba(255, 255, 255, 0.1);
        --btn-text: #000000;
        --btn-disabled-bg: #2a2a2a;
        --btn-disabled-text: #666666;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--ink);
      text-align: center;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-weight: 500;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s, color 0.2s;
    }

    input::placeholder {
      color: var(--input-placeholder);
      font-weight: 400;
    }

    input:focus {
      border-color: var(--ink);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 3px var(--input-ring);
    }

    button {
      background: var(--accent);
      color: var(--btn-text);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, background-color 0.2s, color 0.2s;
    }

    button:hover:not(:disabled) {
      opacity: 0.85;
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    button:disabled {
      background: var(--btn-disabled-bg);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>EdgeTTS for Legado</h1>
    
    <input
      id="token"
      type="password"
      placeholder="输入访问 Token"
      autocomplete="off"
      aria-label="访问 Token"
    >
    
    <button id="go" type="button" disabled>
      输入 Token 后导入
    </button>
  </div>

  <script>
    const tokenInput = document.getElementById("token");
    const importButton = document.getElementById("go");

    function updateButtonState() {
      const hasToken = tokenInput.value.trim().length > 0;
      importButton.disabled = !hasToken;
      importButton.textContent = hasToken ? "一键导入到阅读" : "输入 Token 后导入";
    }

    function buildImportUrl(token) {
      const configUrl = new URL("/config", window.location.origin);
      configUrl.searchParams.set("token", token);
      return "legado://import/httpTTS?src=" + encodeURIComponent(configUrl.toString());
    }

    importButton.addEventListener("click", () => {
      const token = tokenInput.value.trim();
      if (!token) return;

      importButton.textContent = "跳转中...";
      importButton.style.pointerEvents = "none";
      
      setTimeout(() => {
        window.location.href = buildImportUrl(token);
        setTimeout(() => {
          updateButtonState();
          importButton.style.pointerEvents = "auto";
        }, 1000); 
      }, 200);
    });

    tokenInput.addEventListener("input", updateButtonState);
    updateButtonState();
  </script>
</body>
</html>
