# Make sure ./config.toml contains [auth].token, or provide APP__AUTH__TOKEN.
services:
  edge-tts-for-legado:
    image: enximi/edge-tts-for-legado:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      APP__SERVER__HOST: 0.0.0.0
      APP__SERVER__PORT: 8000
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
